    color: var(--white);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 2px solid var(--gold);
  }

  .market-table tbody tr:nth-child(odd) { background: var(--light-bg); }
  .market-table tbody tr:nth-child(even) { background: var(--white); }

  .market-table tbody td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  .market-table .asset-name {
    font-weight: 600;
    color: var(--dark);
    font-family: 'JetBrains Mono', monospace;

  }

  .market-table .price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  .up { color: var(--green); }
  .down { color: var(--red); }

  .change-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  .change-pill.up { background: var(--green-bg); color: var(--green); }
  .change-pill.down { background: var(--red-bg); color: var(--red); }
